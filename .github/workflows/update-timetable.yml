name: Update Stagecoach timetable

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build_timetable.py'
      - '.github/workflows/update-timetable.yml'
  schedule:
    - cron: '25 4 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download and convert Stagecoach East Scotland timetable
        run: python scripts/build_timetable.py
      - name: Commit timetable when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/edinburgh-scheduled.json
          if git diff --cached --quiet; then
            echo "No timetable changes"
          else
            git commit -m "Update official Stagecoach timetable"
            git push
          fi
