<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#071018">
  <title>Edinburgh Stagecoach Checklist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div><p>STAGECOACH • EDINBURGH</p><h1>August Departure Checklist</h1></div>
  <div class="clock"><strong id="clock">--:--</strong><span id="todayLabel"></span></div>
</header>
<main>
  <section class="toolbar">
    <label>Date<input id="datePicker" type="date" min="2026-08-01" max="2026-08-31"></label>
    <label>Search<input id="search" type="search" placeholder="Service or destination"></label>
  </section>

  <section class="summary">
    <div><span>Seen</span><strong id="seenCount">0</strong></div>
    <div><span>Scheduled</span><strong id="totalCount">0</strong></div>
    <div><span>Remaining</span><strong id="remainingCount">0</strong></div>
  </section>

  <nav class="filters" aria-label="Checklist filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="unseen">Not seen</button>
    <button data-filter="seen">Seen</button>
    <button id="clearChecks" class="danger">Clear checks</button>
  </nav>

  <section class="notice" id="dataNotice">Loading the published Stagecoach timetable…</section>
  <section id="departureList" class="list" aria-live="polite"></section>
</main>

<dialog id="journeyDialog">
  <div class="dialog-head"><div><small id="dialogMeta"></small><h2 id="dialogTitle"></h2></div><button id="closeDialog" aria-label="Close">×</button></div>
  <div id="halbeathDetail" class="halbeath-detail"></div>
  <ol id="stopList" class="stops"></ol>
  <a id="liveLink" class="external" target="_blank" rel="noopener noreferrer">Check live running on bustimes.org ↗</a>
</dialog>
<script src="app.js" type="module"></script>
</body>
</html>
