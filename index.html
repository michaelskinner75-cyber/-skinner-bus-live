<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Skinner Bus Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">STAGECOACH EAST SCOTLAND</p>
      <h1>Skinner Bus Live</h1>
    </div>
    <button id="themeButton" class="icon-button" aria-label="Toggle theme">☾</button>
  </header>

  <main>
    <section class="hero">
      <div class="status-row">
        <span class="live-dot"></span>
        <span id="clock">Loading time…</span>
      </div>
      <h2>Where are you travelling from?</h2>
      <div class="search-wrap">
        <span aria-hidden="true">⌕</span>
        <input id="searchInput" type="search" placeholder="Search stop, town or service" autocomplete="off" />
        <button id="clearSearch" aria-label="Clear search">×</button>
      </div>
      <button id="nearMeButton" class="primary-button">📍 Find stops near me</button>
    </section>

    <section>
      <div class="section-heading">
        <h3>Areas</h3>
        <span>Stagecoach only</span>
      </div>
      <div id="areaChips" class="chips"></div>
    </section>

    <section>
      <div class="section-heading">
        <h3>Next departures</h3>
        <button id="refreshButton" class="text-button">Refresh</button>
      </div>
      <div id="departureList" class="departure-list" aria-live="polite"></div>
    </section>

    <section>
      <div class="section-heading">
        <h3>Favourite stops</h3>
      </div>
      <div id="favourites" class="favourites"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Primary navigation">
    <button class="active">⌂<span>Home</span></button>
    <button>◉<span>Map</span></button>
    <button>☆<span>Favourites</span></button>
    <button>☰<span>More</span></button>
  </nav>

  <template id="departureTemplate">
    <article class="departure-card">
      <div class="route-badge"></div>
      <div class="departure-main">
        <div class="destination-row">
          <h4></h4>
          <button class="favourite-button" aria-label="Add favourite">☆</button>
        </div>
        <p class="stop-name"></p>
        <div class="meta-row">
          <span class="status-pill"></span>
          <span class="vehicle"></span>
        </div>
      </div>
      <div class="time-block">
        <strong></strong>
        <span></span>
      </div>
    </article>
  </template>

  <script src="app.js" type="module"></script>
</body>
</html>
